<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Antecessum OR - Registrar Observações</title>

  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/registrar_observacoes.css">

</head>
<body>

  <div class="screen">
    <div class="panel">
      <div class="header">
        <a href="detalhes_sala1.html" class="back">
          ❮
        </a>

        <div class="title-box">
          Registrar Observações
        </div>
      </div>

      <div class="content">

        <div class="label label--boxed">
          Tipo de observação?
        </div>

        <div class="select-box">
          <span>Observação geral</span>
        </div>

        <div class="label label--boxed" style="margin-top:2.5rem;">
          Observações
        </div>

        <div class="textarea-box">
          <textarea placeholder="Digite aqui as observações..."></textarea>

          <div class="counter">
            0/300
          </div>
        </div>

        <div class="label label--boxed" style="margin-top:2.5rem;">
          Anexar arquivo (Opcional)
        </div>

        <div class="upload-area">

          <div class="file-icon">
            📄
          </div>

          <button class="upload-btn">
            Adicionar arquivo
          </button>

        </div>

        <div class="info-text">
          As observações ficam visíveis para toda a equipe.
        </div>

        <button class="confirm-btn">
          Confirmar
        </button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">

    <a href="salas.html" class="nav-icon">🏠</a>

    <a href="alertas.html" class="nav-icon">🔔</a>

    <a href="graficos.html" class="nav-icon">📈</a>

  </div>

  <script src="../scripts/scripts.js"></script>
</body>

</html>
