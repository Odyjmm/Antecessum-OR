<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancelar Procedimento</title>

  <link rel="stylesheet" href="../styles/cancela_procedimento.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/global.css">
</head>

<body>

  <div class="screen">

    <div class="top-bar"></div>

    <div class="header">

      <div class="back-icon">
        ❮
      </div>

      <div class="title-box">
        Cancelar Procedimento
      </div>

    </div>

    <div class="content">

      <div class="warning-box">

        <div class="warning-icon">
          !
        </div>

        <div class="warning-text">
          Tem certeza que deseja cancelar este procedimento?
        </div>

      </div>

      <div class="section-title">
        Selecione o motivo
      </div>

      <div class="reasons-box">

        <div class="radio-item">
          <div class="radio-circle"></div>
          <div class="radio-label">Ausência do Paciente</div>
        </div>

        <div class="radio-item">
          <div class="radio-circle"></div>
          <div class="radio-label">Problemática Clínico</div>
        </div>

        <div class="radio-item">
          <div class="radio-circle"></div>
          <div class="radio-label">Falta de Material</div>
        </div>

        <div class="radio-item">
          <div class="radio-circle"></div>
          <div class="radio-label">Problema da Equipe</div>
        </div>

        <div class="radio-item">
          <div class="radio-circle"></div>
          <div class="radio-label">Outros (Explique o motivo)</div>
        </div>

      </div>

      <div class="section-title">
        Observações
      </div>

      <div class="textarea-box">

        <textarea placeholder="Digite aqui sua observação..."></textarea>

        <div class="counter">
          0/200
        </div>

      </div>

      <button class="confirm-btn">
        Confirmar Cancelamento
      </button>

      <div class="back-text">
        Voltar
      </div>
    </div>

  </div>

  <div class="bottom-nav">

    <a href="salas.html" class="nav-icon">🏠</a>

    <a href="alertas.html" class="nav-icon">🔔</a>

    <a href="graficos.html" class="nav-icon">📈</a>

  </div>

  <script src="../scripts/scripts.js"></script>
</body>

</html>
